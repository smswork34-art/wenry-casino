<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>SwapUSDT · Обменник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--tg-theme-bg-color, #0a0c12);
            color: var(--tg-theme-text-color, #edeef2);
            min-height: 100vh;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 24px 20px 32px;
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #627eea 0%, #4a5fc7 100%);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 8px 20px rgba(98,126,234,0.3);
        }

        .logo h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, #b9c8ff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo p {
            font-size: 0.7rem;
            opacity: 0.5;
        }

        .rate-box {
            background: var(--tg-theme-secondary-bg-color, #11131c);
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 28px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .rate-label {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .rate-value {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        .rate-value small {
            font-size: 1rem;
            font-weight: 500;
            opacity: 0.6;
        }

        .swap-card {
            background: var(--tg-theme-secondary-bg-color, #11131c);
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .input-group {
            background: var(--tg-theme-bg-color, #0a0c12);
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .input-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            opacity: 0.6;
            margin-bottom: 10px;
        }

        .input-field {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .input-field input {
            background: transparent;
            border: none;
            font-size: 1.6rem;
            font-weight: 600;
            font-family: 'Inter', monospace;
            color: var(--tg-theme-text-color, #fff);
            outline: none;
            width: 65%;
            padding: 4px 0;
        }

        .input-field input::placeholder {
            color: rgba(255,255,255,0.2);
        }

        .token {
            background: rgba(98,126,234,0.15);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .action-btn {
            width: 100%;
            background: #627eea;
            border: none;
            padding: 18px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 8px;
        }
        
        .action-btn:active {
            transform: scale(0.98);
            background: #506ad5;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex !important;
        }

        .modal-content {
            background: var(--tg-theme-secondary-bg-color, #14161f);
            border-radius: 32px;
            padding: 28px 24px;
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .modal-amount {
            background: rgba(98,126,234,0.1);
            border-radius: 20px;
            padding: 16px;
            text-align: center;
            margin-bottom: 24px;
        }

        .modal-amount-label {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .modal-amount-value {
            font-size: 2rem;
            font-weight: 800;
            color: #627eea;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-primary {
            background: #627eea;
            padding: 16px;
            border-radius: 48px;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: 0.2s;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.08);
            padding: 16px;
            border-radius: 48px;
            border: none;
            color: var(--tg-theme-text-color, #fff);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-secondary:active {
            transform: scale(0.98);
            background: rgba(255,255,255,0.15);
        }

        .bank-select {
            background: var(--tg-theme-bg-color, #0a0c12);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 14px 16px;
            width: 100%;
            color: var(--tg-theme-text-color, #fff);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }

        .input-field-modal {
            background: var(--tg-theme-bg-color, #0a0c12);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px;
            padding: 14px 16px;
            width: 100%;
            color: var(--tg-theme-text-color, #fff);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            margin-bottom: 16px;
            outline: none;
        }

        .history-section {
            margin-top: 24px;
            background: var(--tg-theme-secondary-bg-color, #11131c);
            border-radius: 24px;
            padding: 20px;
        }

        .history-title {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
            opacity: 0.7;
        }

        .history-item {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            font-size: 0.8rem;
        }

        .history-status {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 6px;
        }

        .status-waiting { background: #f39c12; color: #000; }
        .status-completed { background: #27ae60; color: #fff; }
        .status-cancelled { background: #e74c3c; color: #fff; }
        
        button {
            cursor: pointer;
        }
        
        .debug-info {
            font-size: 10px;
            opacity: 0.3;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-arrows-spin"></i>
            </div>
            <div>
                <h1>SwapUSDT</h1>
                <p>полуавтоматический обмен</p>
            </div>
        </div>
    </div>

    <div class="rate-box">
        <div class="rate-label">Актуальный курс</div>
        <div class="rate-value">75 <small>₽ / USDT</small></div>
    </div>

    <div class="swap-card">
        <div class="input-group">
            <div class="input-header">
                <span>Сумма USDT</span>
                <span>мин. 10 USDT</span>
            </div>
            <div class="input-field">
                <input type="number" id="amountUsdt" placeholder="0.00" value="100">
                <div class="token"><i class="fab fa-usd"></i> USDT</div>
            </div>
        </div>

        <div class="input-group">
            <div class="input-header">
                <span>Вы получите</span>
                <span>комиссия 0%</span>
            </div>
            <div class="input-field">
                <input type="text" id="amountRub" readonly value="7,500">
                <div class="token"><i class="fas fa-ruble-sign"></i> RUB</div>
            </div>
        </div>

        <button class="action-btn" id="exchangeBtn">
            <i class="fas fa-bolt"></i> Обменять USDT → RUB
        </button>
    </div>

    <div class="history-section">
        <div class="history-title"><i class="fas fa-clock"></i> История обменов</div>
        <div id="historyList">Загрузка...</div>
    </div>
    <div class="debug-info" id="debugInfo">Ready</div>
</div>

<!-- Модальное окно 1: оплата счета -->
<div id="modalPayment" class="modal">
    <div class="modal-content">
        <div class="modal-title">💳 Оплата счета</div>
        <div class="modal-amount">
            <div class="modal-amount-label">Сумма к оплате</div>
            <div class="modal-amount-value" id="modalAmountRub">0 ₽</div>
        </div>
        <div class="modal-buttons">
            <button class="btn-primary" id="payBillBtn">
                <i class="fas fa-credit-card"></i> Оплатить счет
            </button>
            <button class="btn-secondary" id="closeModalBtn">
                <i class="fas fa-times"></i> Отмена
            </button>
        </div>
    </div>
</div>

<!-- Модальное окно 2: ввод реквизитов -->
<div id="modalDetails" class="modal">
    <div class="modal-content">
        <div class="modal-title">🏦 Реквизиты для получения</div>
        <select id="bankSelect" class="bank-select">
            <option value="">Выберите банк</option>
            <option value="Т-Банк">Т-Банк</option>
            <option value="Альфа-Банк">Альфа-Банк</option>
            <option value="ВТБ">ВТБ</option>
            <option value="Сбербанк">Сбербанк</option>
        </select>
        <input type="text" id="recipientName" class="input-field-modal" placeholder="ФИО получателя">
        <input type="text" id="recipientPhone" class="input-field-modal" placeholder="Номер телефона (СБП)">
        <button class="btn-primary" id="submitDetailsBtn">
            <i class="fas fa-check-circle"></i> Пройти проверку и получить средства
        </button>
        <button class="btn-secondary" id="closeDetailsBtn" style="margin-top: 12px;">
            <i class="fas fa-arrow-left"></i> Назад
        </button>
    </div>
</div>

<script>
    (function() {
        const SUPABASE_URL = 'https://mstekqneofdufkyqghqu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdGVrcW5lb2ZkdWZreXFnaHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODQzMjksImV4cCI6MjA4OTc2MDMyOX0.N8E1vfkz8lv_eQPmsZGJ7UGxmO23_eQnsi0yciLBGY0';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();
        
        const RATE = 75;
        let currentOrderId = null;
        
        const user = tg.initDataUnsafe?.user || { id: Date.now(), username: 'user_' + Math.floor(Math.random() * 10000), first_name: 'User' };
        const userId = user.id.toString();
        const username = user.username || `${user.first_name || 'User'}`;
        
        const debug = document.getElementById('debugInfo');
        function log(msg) {
            console.log(msg);
            debug.textContent = new Date().toLocaleTimeString() + ': ' + msg;
        }
        
        log('App started, userId: ' + userId);
        
        const amountUsdtInput = document.getElementById('amountUsdt');
        const amountRubInput = document.getElementById('amountRub');
        const exchangeBtn = document.getElementById('exchangeBtn');
        const modalPayment = document.getElementById('modalPayment');
        const modalDetails = document.getElementById('modalDetails');
        const modalAmountRub = document.getElementById('modalAmountRub');
        const payBillBtn = document.getElementById('payBillBtn');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const submitDetailsBtn = document.getElementById('submitDetailsBtn');
        const closeDetailsBtn = document.getElementById('closeDetailsBtn');
        const bankSelect = document.getElementById('bankSelect');
        const recipientName = document.getElementById('recipientName');
        const recipientPhone = document.getElementById('recipientPhone');
        const historyList = document.getElementById('historyList');
        
        function formatNumber(num) {
            return new Intl.NumberFormat('ru-RU').format(num);
        }
        
        function calculateRub() {
            let usdt = parseFloat(amountUsdtInput.value);
            if (isNaN(usdt) || usdt <= 0) {
                amountRubInput.value = '0';
                return 0;
            }
            let rub = usdt * RATE;
            amountRubInput.value = formatNumber(rub);
            return rub;
        }
        
        amountUsdtInput.addEventListener('input', function() {
            calculateRub();
        });
        
        function generateOrderId() {
            return 'ORD_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8).toUpperCase();
        }
        
        async function saveOrder(usdt, rub, orderId) {
            try {
                log('Saving order...');
                const { data, error } = await supabase
                    .from('exchange_orders')
                    .insert([{
                        order_id: orderId,
                        user_id: userId,
                        username: username,
                        amount_usdt: usdt,
                        amount_rub: rub,
                        rate: RATE,
                        status: 'waiting_payment'
                    }])
                    .select();
                
                if (error) {
                    log('Error: ' + error.message);
                    tg.showPopup({
                        title: 'Ошибка',
                        message: 'Не удалось создать заявку: ' + error.message,
                        buttons: [{type: 'ok'}]
                    });
                    return false;
                }
                log('Order saved: ' + orderId);
                return true;
            } catch (err) {
                log('Exception: ' + err.message);
                return false;
            }
        }
        
        async function updateOrderWithDetails(orderId, bank, name, phone) {
            try {
                log('Updating order with details...');
                const { error } = await supabase
                    .from('exchange_orders')
                    .update({
                        bank: bank,
                        recipient_name: name,
                        recipient_phone: phone,
                        status: 'payment_verified'
                    })
                    .eq('order_id', orderId);
                
                if (error) {
                    log('Update error: ' + error.message);
                    return false;
                }
                log('Order updated');
                return true;
            } catch (err) {
                log('Exception: ' + err.message);
                return false;
            }
        }
        
        async function loadHistory() {
            try {
                log('Loading history...');
                const { data, error } = await supabase
                    .from('exchange_orders')
                    .select('*')
                    .eq('user_id', userId)
                    .order('created_at', { ascending: false })
                    .limit(10);
                
                if (error) {
                    log('History error: ' + error.message);
                    historyList.innerHTML = '<div style="opacity:0.5; text-align:center;">Ошибка загрузки</div>';
                    return;
                }
                
                if (!data || data.length === 0) {
                    historyList.innerHTML = '<div style="opacity:0.5; text-align:center;">Нет обменов</div>';
                    return;
                }
                
                let html = '';
                data.forEach(order => {
                    let statusText = '';
                    let statusClass = '';
                    if (order.status === 'waiting_payment') {
                        statusText = 'Ожидает оплаты';
                        statusClass = 'status-waiting';
                    } else if (order.status === 'payment_verified') {
                        statusText = 'Проверяется';
                        statusClass = 'status-waiting';
                    } else if (order.status === 'completed') {
                        statusText = 'Выполнен';
                        statusClass = 'status-completed';
                    } else if (order.status === 'cancelled') {
                        statusText = 'Отменен';
                        statusClass = 'status-cancelled';
                    }
                    
                    const date = new Date(order.created_at).toLocaleString('ru-RU');
                    html += `
                        <div class="history-item">
                            <div><strong>${order.amount_usdt}</strong> USDT → <strong>${order.amount_rub}</strong> ₽</div>
                            <div style="font-size:0.7rem; opacity:0.5;">${date}</div>
                            <div class="history-status ${statusClass}">${statusText}</div>
                        </div>
                    `;
                });
                historyList.innerHTML = html;
                log('History loaded, ' + data.length + ' orders');
            } catch (err) {
                log('Exception: ' + err.message);
                historyList.innerHTML = '<div style="opacity:0.5; text-align:center;">Ошибка загрузки</div>';
            }
        }
        
        function openPaymentModal(usdt, rub) {
            log('Opening payment modal, rub: ' + rub);
            modalAmountRub.textContent = `${rub.toFixed(2)} ₽`;
            modalPayment.classList.add('active');
            log('Modal active class added');
        }
        
        // Главная кнопка обмена
        exchangeBtn.addEventListener('click', async function(e) {
            e.preventDefault();
            log('Exchange button CLICKED!');
            
            let usdt = parseFloat(amountUsdtInput.value);
            log('USDT amount: ' + usdt);
            
            if (isNaN(usdt) || usdt <= 0) {
                log('Invalid amount');
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Введите корректную сумму USDT',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            if (usdt < 10) {
                log('Min amount not met');
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Минимальная сумма 10 USDT',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            const rub = usdt * RATE;
            const orderId = generateOrderId();
            log('Creating order: ' + orderId + ', rub: ' + rub);
            
            const saved = await saveOrder(usdt, rub, orderId);
            
            if (saved) {
                currentOrderId = orderId;
                log('Order created, opening modal');
                openPaymentModal(usdt, rub);
                await loadHistory();
            } else {
                log('Failed to save order');
            }
        });
        
        // Кнопка оплатить счет
        payBillBtn.addEventListener('click', function() {
            log('Pay bill clicked');
            const paymentLink = 'https://t.me/send?start=IVbPoRLGan1F';
            tg.openTelegramLink(paymentLink);
            modalPayment.classList.remove('active');
            modalDetails.classList.add('active');
            log('Opened details modal');
        });
        
        // Отправка реквизитов
        submitDetailsBtn.addEventListener('click', async function() {
            log('Submit details clicked');
            
            const bank = bankSelect.value;
            const name = recipientName.value.trim();
            const phone = recipientPhone.value.trim();
            
            if (!bank) {
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Выберите банк',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            if (!name) {
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Введите ФИО получателя',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            if (!phone || phone.length < 10) {
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Введите корректный номер телефона',
                    buttons: [{type: 'ok'}]
                });
                return;
            }
            
            const updated = await updateOrderWithDetails(currentOrderId, bank, name, phone);
            
            if (updated) {
                tg.showPopup({
                    title: '✅ Заявка отправлена',
                    message: 'Ваши реквизиты переданы оплатчику. Ожидайте проверки.',
                    buttons: [{type: 'ok'}]
                });
                
                modalDetails.classList.remove('active');
                
                bankSelect.value = '';
                recipientName.value = '';
                recipientPhone.value = '';
                currentOrderId = null;
                
                await loadHistory();
                log('Order submitted successfully');
            } else {
                tg.showPopup({
                    title: 'Ошибка',
                    message: 'Не удалось отправить заявку',
                    buttons: [{type: 'ok'}]
                });
                log('Failed to submit order');
            }
        });
        
        // Закрытие модалок
        closeModalBtn.addEventListener('click', function() {
            log('Close modal clicked');
            modalPayment.classList.remove('active');
        });
        
        closeDetailsBtn.addEventListener('click', function() {
            log('Close details clicked');
            modalDetails.classList.remove('active');
            modalPayment.classList.add('active');
        });
        
        // Закрытие по клику на фон
        modalPayment.addEventListener('click', function(e) {
            if (e.target === modalPayment) {
                log('Clicked on modal background');
                modalPayment.classList.remove('active');
            }
        });
        
        modalDetails.addEventListener('click', function(e) {
            if (e.target === modalDetails) {
                modalDetails.classList.remove('active');
            }
        });
        
        calculateRub();
        loadHistory();
        
        // Подписка на обновления заказа
        supabase
            .channel('orders_' + userId)
            .on('postgres_changes', 
                { 
                    event: 'UPDATE', 
                    schema: 'public', 
                    table: 'exchange_orders', 
                    filter: `user_id=eq.${userId}` 
                },
                (payload) => {
                    log('Order update received, status: ' + payload.new.status);
                    if (payload.new.status === 'completed') {
                        tg.showPopup({
                            title: '💸 Средства отправлены!',
                            message: 'Оплатчик подтвердил отправку средств. Деньги скоро поступят на ваш счет.',
                            buttons: [{type: 'ok'}]
                        });
                        loadHistory();
                    } else if (payload.new.status === 'cancelled') {
                        tg.showPopup({
                            title: '❌ Заявка отменена',
                            message: 'Оплатчик отменил заявку. Попробуйте создать новую.',
                            buttons: [{type: 'ok'}]
                        });
                        loadHistory();
                    }
                }
            )
            .subscribe();
        
        log('App fully initialized, waiting for user action');
    })();
</script>
</body>
</html>
