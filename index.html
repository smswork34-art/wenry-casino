<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Exchange | USDT → RUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
            line-height: 1.4;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
            position: relative;
        }

        .language-switch {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 8px;
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            padding: 4px;
            border-radius: 20px;
        }

        .lang-btn {
            padding: 6px 12px;
            font-size: 13px;
            font-weight: 500;
            border: none;
            border-radius: 16px;
            background: transparent;
            color: var(--tg-theme-hint-color, #8e8e93);
            cursor: pointer;
            transition: all 0.2s;
        }

        .lang-btn.active {
            background: var(--tg-theme-button-color, #2c7be5);
            color: var(--tg-theme-button-text-color, #ffffff);
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--tg-theme-button-color, #2c7be5);
            border-radius: 24px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo svg {
            width: 28px;
            height: 28px;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .rate-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .rate-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .rate-value {
            font-size: 36px;
            font-weight: 600;
            color: var(--tg-theme-text-color, #000000);
        }

        .rate-unit {
            font-size: 16px;
            font-weight: 400;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .form-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 50px 14px 16px;
            font-size: 18px;
            font-weight: 500;
            border: 1px solid var(--tg-theme-hint-color, #e5e5ea);
            border-radius: 12px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #2c7be5);
        }

        .input-wrapper input::placeholder {
            color: var(--tg-theme-hint-color, #c6c6c8);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .input-icon svg {
            width: 20px;
            height: 20px;
        }

        .result-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .result-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 32px;
            font-weight: 600;
            color: var(--tg-theme-text-color, #000000);
        }

        .fee-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fee-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fee-left svg {
            width: 18px;
            height: 18px;
        }

        .fee-label {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .fee-value {
            font-size: 14px;
            font-weight: 500;
            color: var(--tg-theme-text-color, #000000);
        }

        .exchange-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: var(--tg-theme-button-color, #2c7be5);
            color: var(--tg-theme-button-text-color, #ffffff);
            cursor: pointer;
            transition: opacity 0.2s;
            margin-bottom: 16px;
        }

        .exchange-btn:active {
            opacity: 0.8;
        }

        .exchange-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .info-row {
            margin-top: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--tg-theme-bg-color, #ffffff);
            border-radius: 20px;
            padding: 24px;
            max-width: 320px;
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .modal-text {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 20px;
        }

        .modal-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            background: var(--tg-theme-button-color, #2c7be5);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="language-switch">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2V22M17 7L12 2L7 7" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M17 17L12 22L7 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4 12H20" stroke="white" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="title" data-i18n="title">Exchange</div>
            <div class="subtitle" data-i18n="subtitle">USDT → RUB</div>
        </div>

        <div class="rate-card">
            <div class="rate-label" data-i18n="rate_label">Current rate</div>
            <div class="rate-value">75.00 <span class="rate-unit">RUB</span></div>
            <div class="rate-label" style="margin-top: 4px;" data-i18n="rate_per">per 1 USDT</div>
        </div>

        <div class="form-card">
            <div class="input-group">
                <div class="input-label">
                    <span data-i18n="you_send">You send</span>
                    <span data-i18n="min_amount">min 10 USDT</span>
                </div>
                <div class="input-wrapper">
                    <input type="number" id="usdtAmount" placeholder="0.00" step="any">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/>
                            <path d="M12 6V18M9 9L12 6L15 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <path d="M15 15L12 18L9 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </span>
                </div>
            </div>
        </div>

        <div class="result-card">
            <div class="result-label" data-i18n="you_receive">You receive</div>
            <div class="result-value" id="rubAmount">0.00 RUB</div>
        </div>

        <div class="fee-card">
            <div class="fee-left">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2V22M17 7L12 2L7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M17 17L12 22L7 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="fee-label" data-i18n="service_fee">Service fee</span>
            </div>
            <div class="fee-value" id="feeValue">0.00 RUB</div>
        </div>

        <button class="exchange-btn" id="exchangeBtn" data-i18n="sell_btn">Sell USDT</button>

        <div class="info">
            <div class="info-row" data-i18n="info_instant">Instant exchange via CryptoPay</div>
            <div class="info-row" data-i18n="info_rate">Best rate on market</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">Payment</div>
            <div class="modal-text" id="modalText"></div>
            <button class="modal-btn" id="modalBtn">OK</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // Конфиг
        const RATE = 75.00;
        const FEE_PERCENT = 0.5;
        const MIN_AMOUNT = 10;
        
        // CryptoPay токен (публичный, для создания инвойсов)
        const CRYPTOPAY_TOKEN = '506281:AA5l3vPE3YzFZbe8CCCAT8oukXYsMdTYJbP';
        
        // Translations
        const translations = {
            ru: {
                title: 'Обменник',
                subtitle: 'USDT → RUB',
                rate_label: 'Актуальный курс',
                rate_per: 'за 1 USDT',
                you_send: 'Вы отдаете',
                min_amount: 'мин 10 USDT',
                you_receive: 'Вы получаете',
                service_fee: 'Комиссия сервиса',
                sell_btn: 'Продать USDT',
                info_instant: 'Мгновенный обмен через CryptoPay',
                info_rate: 'Лучший курс на рынке',
                alerts: {
                    enter_amount: 'Введите сумму',
                    min_amount: 'Минимальная сумма: {amount} USDT',
                    creating: 'Создание платежа...',
                    success: 'Платеж создан! Оплатите через @send',
                    error: 'Ошибка при создании платежа'
                },
                modal: {
                    title: 'Оплата через CryptoPay',
                    text: 'Нажмите OK, чтобы открыть @send и оплатить {amount} USDT',
                    ok: 'OK'
                }
            },
            en: {
                title: 'Exchange',
                subtitle: 'USDT → RUB',
                rate_label: 'Current rate',
                rate_per: 'per 1 USDT',
                you_send: 'You send',
                min_amount: 'min 10 USDT',
                you_receive: 'You receive',
                service_fee: 'Service fee',
                sell_btn: 'Sell USDT',
                info_instant: 'Instant exchange via CryptoPay',
                info_rate: 'Best rate on market',
                alerts: {
                    enter_amount: 'Enter amount',
                    min_amount: 'Minimum amount: {amount} USDT',
                    creating: 'Creating payment...',
                    success: 'Payment created! Pay via @send',
                    error: 'Error creating payment'
                },
                modal: {
                    title: 'CryptoPay Payment',
                    text: 'Click OK to open @send and pay {amount} USDT',
                    ok: 'OK'
                }
            }
        };
        
        let currentLang = 'ru';
        
        // Elements
        const i18nElements = document.querySelectorAll('[data-i18n]');
        const usdtInput = document.getElementById('usdtAmount');
        const rubAmount = document.getElementById('rubAmount');
        const feeValue = document.getElementById('feeValue');
        const exchangeBtn = document.getElementById('exchangeBtn');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalText = document.getElementById('modalText');
        const modalBtn = document.getElementById('modalBtn');
        
        function updateLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            i18nElements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    el.textContent = t[key];
                }
            });
            
            exchangeBtn.textContent = t.sell_btn;
        }
        
        function formatNumber(num) {
            return num.toLocaleString(currentLang === 'ru' ? 'ru-RU' : 'en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        function calculate() {
            let usdt = parseFloat(usdtInput.value);
            if (isNaN(usdt)) usdt = 0;
            
            let rubGross = usdt * RATE;
            let fee = rubGross * (FEE_PERCENT / 100);
            let rubNet = rubGross - fee;
            
            if (rubNet < 0) rubNet = 0;
            
            rubAmount.textContent = formatNumber(rubNet) + ' RUB';
            feeValue.textContent = formatNumber(fee) + ' RUB';
            
            return { usdt, rubNet, fee };
        }
        
        function showModal(title, text, onClose) {
            modalTitle.textContent = title;
            modalText.textContent = text;
            modal.classList.add('active');
            
            const closeModal = () => {
                modal.classList.remove('active');
                if (onClose) onClose();
            };
            
            modalBtn.onclick = closeModal;
        }
        
        // Создание инвойса через CryptoPay API напрямую
        async function createInvoice(amount, description) {
            const url = 'https://pay.crypt.bot/api/createInvoice';
            const params = new URLSearchParams();
            params.append('asset', 'USDT');
            params.append('amount', amount.toString());
            params.append('description', description);
            params.append('paid_btn_name', 'callback');
            params.append('paid_btn_url', window.location.href);
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Crypto-Pay-API-Token': CRYPTOPAY_TOKEN,
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: params
                });
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error creating invoice:', error);
                throw error;
            }
        }
        
        async function handleExchange() {
            let usdt = parseFloat(usdtInput.value);
            const t = translations[currentLang];
            
            if (isNaN(usdt) || usdt <= 0) {
                tg.showAlert(t.alerts.enter_amount);
                return;
            }
            
            if (usdt < MIN_AMOUNT) {
                tg.showAlert(t.alerts.min_amount.replace('{amount}', MIN_AMOUNT));
                return;
            }
            
            exchangeBtn.disabled = true;
            exchangeBtn.textContent = t.alerts.creating;
            
            try {
                // Создаем инвойс в CryptoPay
                const invoice = await createInvoice(usdt, `Exchange ${usdt} USDT to RUB`);
                
                if (invoice.ok && invoice.result) {
                    const payUrl = invoice.result.pay_url;
                    const invoiceId = invoice.result.invoice_id;
                    
                    // Отправляем данные в Telegram для открытия @send
                    tg.sendData(JSON.stringify({
                        action: 'pay',
                        invoiceId: invoiceId,
                        payUrl: payUrl,
                        amount: usdt,
                        currency: 'USDT'
                    }));
                    
                    // Показываем модальное окно с ссылкой
                    showModal(
                        t.modal.title,
                        t.modal.text.replace('{amount}', usdt),
                        () => {
                            // Открываем ссылку для оплаты
                            tg.openTelegramLink(payUrl);
                        }
                    );
                    
                    exchangeBtn.disabled = false;
                    exchangeBtn.textContent = t.sell_btn;
                } else {
                    throw new Error('Failed to create invoice');
                }
            } catch (error) {
                console.error('Exchange error:', error);
                tg.showAlert(t.alerts.error);
                exchangeBtn.disabled = false;
                exchangeBtn.textContent = t.sell_btn;
            }
        }
        
        // Language buttons
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                currentLang = lang;
                
                document.querySelectorAll('.lang-btn').forEach(b => {
                    b.classList.remove('active');
                });
                btn.classList.add('active');
                
                updateLanguage(lang);
                calculate();
            });
        });
        
        // Event listeners
        usdtInput.addEventListener('input', function() {
            let val = this.value.replace(/,/g, '.');
            if (val.split('.')[1]?.length > 4) {
                val = parseFloat(val).toFixed(4);
                this.value = val;
            }
            calculate();
        });
        
        exchangeBtn.addEventListener('click', handleExchange);
        
        // Initialize
        updateLanguage('ru');
        calculate();
        tg.ready();
    </script>
</body>
</html>
