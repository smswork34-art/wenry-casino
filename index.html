<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>W-T · Tap Miner</title>
    <!-- Telegram Mini App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js?56"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #050505;
            color: #ffffff;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            font-weight: 400;
            line-height: 1.4;
            padding: 0;
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(100, 80, 200, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px 20px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
            position: relative;
            z-index: 1;
            min-height: 100vh;
        }

        /* Header with language selector */
        .header-top {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
            margin-bottom: 4px;
        }

        .lang-selector {
            display: flex;
            gap: 4px;
            background: rgba(30, 30, 35, 0.6);
            backdrop-filter: blur(10px);
            padding: 4px;
            border-radius: 60px;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
        }

        .lang-btn {
            background: transparent;
            border: none;
            padding: 6px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-family: inherit;
            letter-spacing: 0.5px;
        }

        .lang-btn.active {
            background: linear-gradient(135deg, #d4af37, #f5e56b);
            color: #050505;
            box-shadow: 0 2px 8px rgba(212, 175, 55, 0.3);
        }

        .lang-btn:hover:not(.active) {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Logo Section - tap target */
        .logo-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 16px;
            width: 100%;
        }

        .tap-target {
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            position: relative;
        }

        .tap-target.tapping {
            transform: scale(0.94);
        }

        .tap-target.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .tap-target.disabled:active {
            transform: scale(1);
        }

        .coin-logo {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #d4af37, #f5e56b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4), 0 0 0 6px rgba(212, 175, 55, 0.2);
            transition: all 0.2s ease;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }

        .coin-logo svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        /* Cooldown ring */
        .cooldown-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #d4af37 0deg, rgba(212, 175, 55, 0.3) 0deg);
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .cooldown-ring.active {
            opacity: 1;
        }

        .tap-hint {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(30, 30, 35, 0.6);
            backdrop-filter: blur(10px);
            padding: 8px 20px;
            border-radius: 60px;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .tap-hint svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .cooldown-timer {
            color: #d4af37;
            font-weight: 600;
            margin-left: 4px;
        }

        .token-info {
            text-align: center;
        }

        .token-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 4px;
        }

        .token-symbol {
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.5);
            background: rgba(255, 255, 255, 0.05);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(10px);
        }

        /* Balance Card */
        .balance-card {
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 32px 32px;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            width: 100%;
        }

        .balance-label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .balance-label svg {
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }

        .balance-value {
            font-size: 4rem;
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #ffffff, #d4af37);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            word-break: break-word;
        }

        .balance-value small {
            font-size: 1.2rem;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.4);
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
        }

        /* Stats Row */
        .stats-row {
            display: flex;
            gap: 16px;
            justify-content: center;
            width: 100%;
        }

        .stat-card {
            flex: 1;
            max-width: 160px;
            background: rgba(20, 20, 25, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 18px 12px;
            text-align: center;
            border: 0.5px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .stat-label svg {
            width: 12px;
            height: 12px;
            opacity: 0.6;
        }

        .stat-value {
            font-size: 1.6rem;
            font-weight: 700;
            color: #d4af37;
        }

        .stat-sub {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        /* Reset timer */
        .reset-info {
            width: 100%;
            text-align: center;
            margin-top: 4px;
        }

        .reset-timer {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(30, 30, 35, 0.5);
            backdrop-filter: blur(10px);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .reset-timer svg {
            width: 12px;
            height: 12px;
        }

        .footer-note {
            text-align: center;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 16px;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255, 255, 255, 0.08);
            letter-spacing: 0.3px;
            width: 100%;
        }

        /* Enhanced Tap Animation */
        @keyframes tapRipple {
            0% {
                transform: scale(0.5);
                opacity: 0.8;
            }
            100% {
                transform: scale(2.5);
                opacity: 0;
            }
        }

        .tap-ripple {
            position: fixed;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.9) 0%, rgba(212, 175, 55, 0.3) 40%, rgba(212, 175, 55, 0) 70%);
            pointer-events: none;
            animation: tapRipple 0.5s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 1;
            }
            30% {
                transform: translateY(-20px) scale(1.2);
            }
            100% {
                transform: translateY(-80px) scale(1);
                opacity: 0;
            }
        }

        @keyframes glowPulse {
            0% {
                text-shadow: 0 0 0px rgba(212, 175, 55, 0);
            }
            50% {
                text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
            }
            100% {
                text-shadow: 0 0 0px rgba(212, 175, 55, 0);
            }
        }

        .tap-number {
            position: fixed;
            font-size: 1.4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #d4af37, #f5e56b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1001;
            font-weight: 800;
            white-space: nowrap;
        }

        .balance-pulse {
            animation: glowPulse 0.4s ease-out;
        }

        @keyframes coinFlash {
            0% {
                filter: brightness(1) drop-shadow(0 0 0px rgba(212, 175, 55, 0));
            }
            50% {
                filter: brightness(1.4) drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
            }
            100% {
                filter: brightness(1) drop-shadow(0 0 0px rgba(212, 175, 55, 0));
            }
        }

        .coin-flash {
            animation: coinFlash 0.3s ease-out;
        }

        @media (max-width: 480px) {
            .coin-logo {
                width: 160px;
                height: 160px;
            }
            .coin-logo svg {
                width: 88px;
                height: 88px;
            }
            .balance-value {
                font-size: 3rem;
            }
            .stat-value {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 380px) {
            .coin-logo {
                width: 140px;
                height: 140px;
            }
            .coin-logo svg {
                width: 76px;
                height: 76px;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header-top">
        <div class="lang-selector">
            <button class="lang-btn active" data-lang="ru">RU</button>
            <button class="lang-btn" data-lang="en">EN</button>
        </div>
    </div>

    <div class="logo-section">
        <div class="tap-target" id="tapTarget">
            <div class="coin-logo" id="coinLogo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="46" fill="url(#gradient)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
                    <path d="M50 28 L54 40 L67 42 L57 50 L61 63 L50 55 L39 63 L43 50 L33 42 L46 40 L50 28Z" fill="white" fill-opacity="0.95"/>
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#D4AF37"/>
                            <stop offset="100%" stop-color="#F5E56B"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <div class="cooldown-ring" id="cooldownRing"></div>
        </div>
        <div class="tap-hint" id="tapHint">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M7 10L12 5L17 10M7 14L12 19L17 14"/>
                <path d="M12 5v14"/>
            </svg>
            <span id="tapHintText">Tap the coin | +0.02 W-T</span>
            <span class="cooldown-timer" id="cooldownTimer"></span>
        </div>
        <div class="token-info">
            <div class="token-name">W-T</div>
            <div class="token-symbol" id="tokenSymbol">WAVES TOKEN</div>
        </div>
    </div>

    <div class="balance-card">
        <div class="balance-label">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 6v6l4 2"/>
            </svg>
            <span id="balanceLabel">TOTAL BALANCE</span>
        </div>
        <div class="balance-value" id="balanceDisplay">0.0000 <small>W-T</small></div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <div class="stat-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <span id="todayLabel">TODAY TAPS</span>
            </div>
            <div class="stat-value" id="todayTaps">0</div>
            <div class="stat-sub" id="maxTapsSub">/ 10</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M12 8v4l3 3M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/>
                </svg>
                <span id="totalTapsLabel">TOTAL TAPS</span>
            </div>
            <div class="stat-value" id="totalTaps">0</div>
        </div>
    </div>

    <div class="reset-info">
        <div class="reset-timer" id="resetTimer">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <circle cx="12" cy="12" r="10"/>
                <polyline points="12 6 12 12 16 14"/>
            </svg>
            <span id="resetTimerText">Reset in: 24:00:00</span>
        </div>
    </div>

    <div class="footer-note" id="footerNote">
        W-T · Tap to earn | 0.02 W-T per tap · 3s cooldown · 10 taps/day
    </div>
</div>

<script>
    (function() {
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        tg.MainButton.hide();
        tg.BackButton.hide();
        
        // Constants
        const TAP_REWARD = 0.02;
        const MAX_TAPS_PER_DAY = 10;
        const COOLDOWN_SECONDS = 3;
        
        // State
        let currentLang = 'ru';
        let balance = 0.0;
        let todayTaps = 0;
        let totalTaps = 0;
        let lastTapDate = null;
        let lastTapTime = 0;
        let cooldownInterval = null;
        
        // Translations
        const translations = {
            ru: {
                tokenSymbol: 'WAVES TOKEN',
                balanceLabel: 'ОБЩИЙ БАЛАНС',
                tapHintText: 'Тапни по монете | +0.02 W-T',
                todayLabel: 'ТАПОВ СЕГОДНЯ',
                totalTapsLabel: 'ВСЕГО ТАПОВ',
                resetTimerText: 'Сброс через: {time}',
                footerNote: 'W-T · Тапай чтобы заработать | 0.02 W-T за тап · 3 сек · 10 тапов/день',
                tapLimitReached: 'Дневной лимит',
                tapLimitReachedMsg: 'Вы уже использовали 10 тапов сегодня. Возвращайтесь завтра!',
                tapCooldown: 'Подождите',
                tapCooldownMsg: 'Можно тапать раз в 3 секунды. Осталось {time} сек.',
                tapSuccess: '+0.02 W-T',
                dayReset: 'Новый день! Лимит тапов обновлен.',
                reward: '+{amount} W-T'
            },
            en: {
                tokenSymbol: 'WAVES TOKEN',
                balanceLabel: 'TOTAL BALANCE',
                tapHintText: 'Tap the coin | +0.02 W-T',
                todayLabel: 'TODAY TAPS',
                totalTapsLabel: 'TOTAL TAPS',
                resetTimerText: 'Reset in: {time}',
                footerNote: 'W-T · Tap to earn | 0.02 W-T per tap · 3s cooldown · 10 taps/day',
                tapLimitReached: 'Daily limit',
                tapLimitReachedMsg: 'You have reached 10 taps today. Come back tomorrow!',
                tapCooldown: 'Wait',
                tapCooldownMsg: 'You can tap every 3 seconds. Wait {time} sec.',
                tapSuccess: '+0.02 W-T',
                dayReset: 'New day! Tap limit refreshed.',
                reward: '+{amount} W-T'
            }
        };
        
        // Helper functions
        function getTodayDateStr() {
            const now = new Date();
            return `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
        }
        
        function isNewDay() {
            if (!lastTapDate) return true;
            return lastTapDate !== getTodayDateStr();
        }
        
        function checkAndResetDaily() {
            if (isNewDay()) {
                todayTaps = 0;
                lastTapDate = getTodayDateStr();
                saveToStorage();
                return true;
            }
            return false;
        }
        
        function isOnCooldown() {
            const now = Date.now();
            return (now - lastTapTime) < COOLDOWN_SECONDS * 1000;
        }
        
        function getRemainingCooldown() {
            const now = Date.now();
            const elapsed = (now - lastTapTime) / 1000;
            return Math.max(0, COOLDOWN_SECONDS - elapsed);
        }
        
        function canTap() {
            checkAndResetDaily();
            if (todayTaps >= MAX_TAPS_PER_DAY) return false;
            if (isOnCooldown()) return false;
            return true;
        }
        
        function addTap() {
            if (todayTaps >= MAX_TAPS_PER_DAY) {
                const t = translations[currentLang];
                showAlert(t.tapLimitReached, t.tapLimitReachedMsg);
                return false;
            }
            
            if (isOnCooldown()) {
                const remaining = Math.ceil(getRemainingCooldown());
                const t = translations[currentLang];
                showAlert(t.tapCooldown, t.tapCooldownMsg.replace('{time}', remaining));
                return false;
            }
            
            balance += TAP_REWARD;
            todayTaps++;
            totalTaps++;
            lastTapTime = Date.now();
            lastTapDate = getTodayDateStr();
            saveToStorage();
            fullUIUpdate();
            updateCooldownDisplay();
            return true;
        }
        
        function saveToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                balance,
                todayTaps,
                totalTaps,
                lastTapDate,
                lastTapTime
            }));
        }
        
        function loadFromStorage() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                if (typeof data.balance === 'number') {
                    balance = data.balance;
                    todayTaps = data.todayTaps || 0;
                    totalTaps = data.totalTaps || 0;
                    lastTapDate = data.lastTapDate;
                    lastTapTime = data.lastTapTime || 0;
                    
                    if (isNewDay()) {
                        todayTaps = 0;
                        lastTapDate = getTodayDateStr();
                        saveToStorage();
                    }
                    return true;
                }
            } catch(e) {}
            return false;
        }
        
        function showAlert(title, message) {
            if (tg && tg.showAlert) {
                tg.showAlert(`${title}\n${message}`);
            } else {
                alert(`${title}\n${message}`);
            }
        }
        
        function showTapAnimation(x, y, amount) {
            // Ripple effect
            const ripple = document.createElement('div');
            ripple.className = 'tap-ripple';
            ripple.style.left = `${x - 40}px`;
            ripple.style.top = `${y - 40}px`;
            document.body.appendChild(ripple);
            setTimeout(() => ripple.remove(), 500);
            
            // Floating number with reward
            const number = document.createElement('div');
            number.className = 'tap-number';
            number.textContent = `+${amount.toFixed(3)}`;
            number.style.left = `${x - 25}px`;
            number.style.top = `${y - 35}px`;
            document.body.appendChild(number);
            setTimeout(() => number.remove(), 800);
            
            // Coin flash animation
            const coinLogo = document.getElementById('coinLogo');
            coinLogo.classList.add('coin-flash');
            setTimeout(() => coinLogo.classList.remove('coin-flash'), 300);
            
            // Balance pulse animation
            const balanceDisplay = document.getElementById('balanceDisplay');
            balanceDisplay.classList.add('balance-pulse');
            setTimeout(() => balanceDisplay.classList.remove('balance-pulse'), 400);
        }
        
        function handleTap(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            let x, y;
            
            if (event.touches) {
                x = event.touches[0].clientX;
                y = event.touches[0].clientY;
                event.preventDefault();
            } else {
                x = event.clientX;
                y = event.clientY;
            }
            
            const success = addTap();
            if (success) {
                showTapAnimation(x, y, TAP_REWARD);
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.impact('medium');
                }
            } else {
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notification('warning');
                }
            }
        }
        
        function updateCooldownDisplay() {
            const cooldownTimer = document.getElementById('cooldownTimer');
            const tapTarget = document.getElementById('tapTarget');
            
            if (isOnCooldown()) {
                const remaining = getRemainingCooldown();
                cooldownTimer.textContent = `(${remaining.toFixed(1)}s)`;
                tapTarget.classList.add('disabled');
            } else {
                cooldownTimer.textContent = '';
                tapTarget.classList.remove('disabled');
            }
        }
        
        function startCooldownUpdater() {
            updateCooldownDisplay();
            if (cooldownInterval) clearInterval(cooldownInterval);
            cooldownInterval = setInterval(() => {
                updateCooldownDisplay();
            }, 100);
        }
        
        function updateLanguage() {
            const t = translations[currentLang];
            document.getElementById('tokenSymbol').innerText = t.tokenSymbol;
            document.getElementById('balanceLabel').innerText = t.balanceLabel;
            document.getElementById('tapHintText').innerHTML = t.tapHintText;
            document.getElementById('todayLabel').innerText = t.todayLabel;
            document.getElementById('totalTapsLabel').innerText = t.totalTapsLabel;
            document.getElementById('footerNote').innerText = t.footerNote;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === currentLang);
            });
            
            updateTimerDisplay();
        }
        
        function updateTimerDisplay() {
            const t = translations[currentLang];
            const now = new Date();
            const tomorrow = new Date(now);
            tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(0, 0, 0, 0);
            const diff = tomorrow - now;
            
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            document.getElementById('resetTimerText').innerHTML = t.resetTimerText.replace('{time}', timeStr);
        }
        
        function updateBalanceUI() {
            const formatted = balance.toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 });
            document.getElementById('balanceDisplay').innerHTML = `${formatted} <small>W-T</small>`;
        }
        
        function updateStatsUI() {
            document.getElementById('todayTaps').innerText = todayTaps;
            document.getElementById('totalTaps').innerText = totalTaps;
            const maxSub = document.getElementById('maxTapsSub');
            if (maxSub) maxSub.innerText = `/ ${MAX_TAPS_PER_DAY}`;
            
            const hintEl = document.getElementById('tapHint');
            if (todayTaps >= MAX_TAPS_PER_DAY) {
                hintEl.style.opacity = '0.5';
            } else {
                hintEl.style.opacity = '1';
            }
        }
        
        function fullUIUpdate() {
            updateBalanceUI();
            updateStatsUI();
            saveToStorage();
        }
        
        function initData() {
            const loaded = loadFromStorage();
            if (!loaded) {
                balance = 0;
                todayTaps = 0;
                totalTaps = 0;
                lastTapDate = getTodayDateStr();
                lastTapTime = 0;
                saveToStorage();
            }
            fullUIUpdate();
        }
        
        function startTimer() {
            updateTimerDisplay();
            setInterval(() => updateTimerDisplay(), 1000);
        }
        
        function checkDayReset() {
            setInterval(() => {
                if (isNewDay()) {
                    todayTaps = 0;
                    lastTapDate = getTodayDateStr();
                    saveToStorage();
                    fullUIUpdate();
                    const t = translations[currentLang];
                    if (tg && tg.showPopup) {
                        tg.showPopup({ title: 'W-T', message: t.dayReset, buttons: [{ type: 'ok' }] });
                    }
                }
            }, 60000);
        }
        
        // Storage key
        const STORAGE_KEY = 'wt_tap_miner_v2';
        
        // Event listeners
        const tapTarget = document.getElementById('tapTarget');
        tapTarget.addEventListener('click', handleTap);
        tapTarget.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleTap(e);
        });
        
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                if (lang && lang !== currentLang) {
                    currentLang = lang;
                    updateLanguage();
                    saveToStorage();
                }
            });
        });
        
        // Initialize
        initData();
        updateLanguage();
        startTimer();
        checkDayReset();
        startCooldownUpdater();
        
        window.addEventListener('beforeunload', () => saveToStorage());
    })();
</script>
</body>
</html>
