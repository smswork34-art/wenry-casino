<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Exchange | USDT → RUB</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 32px;
            text-align: center;
            position: relative;
        }

        .language-switch {
            position: absolute;
            top: 0;
            right: 0;
            display: flex;
            gap: 8px;
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            padding: 4px;
            border-radius: 20px;
        }

        .lang-btn {
            padding: 6px 12px;
            font-size: 13px;
            border: none;
            border-radius: 16px;
            background: transparent;
            color: var(--tg-theme-hint-color, #8e8e93);
            cursor: pointer;
        }

        .lang-btn.active {
            background: var(--tg-theme-button-color, #2c7be5);
            color: white;
        }

        .logo {
            width: 48px;
            height: 48px;
            background: var(--tg-theme-button-color, #2c7be5);
            border-radius: 24px;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .rate-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            margin-bottom: 24px;
        }

        .rate-label {
            font-size: 13px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-bottom: 8px;
        }

        .rate-value {
            font-size: 36px;
            font-weight: 600;
        }

        .form-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-label {
            font-size: 13px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .input-wrapper input {
            width: 100%;
            padding: 14px 16px;
            font-size: 18px;
            font-weight: 500;
            border: 1px solid var(--tg-theme-hint-color, #e5e5ea);
            border-radius: 12px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #2c7be5);
        }

        .result-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            text-align: center;
        }

        .result-value {
            font-size: 32px;
            font-weight: 600;
        }

        .fee-card {
            background: var(--tg-theme-secondary-bg-color, #f8f9fa);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
        }

        .exchange-btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            background: var(--tg-theme-button-color, #2c7be5);
            color: white;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .exchange-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .info {
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .info-row {
            margin-top: 8px;
        }

        .status-badge {
            display: block;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 16px;
            font-size: 14px;
        }

        .status-pending {
            background: rgba(255, 149, 0, 0.15);
            color: #ff9500;
        }

        .status-success {
            background: rgba(52, 199, 89, 0.15);
            color: #34c759;
        }

        .status-error {
            background: rgba(255, 59, 48, 0.15);
            color: #ff3b30;
        }

        .hidden {
            display: none;
        }

        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="language-switch">
                <button class="lang-btn active" data-lang="ru">RU</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                    <path d="M12 2V22M17 7L12 2L7 7" stroke="white" stroke-linecap="round"/>
                    <path d="M17 17L12 22L7 17" stroke="white" stroke-linecap="round"/>
                    <path d="M4 12H20" stroke="white" stroke-linecap="round"/>
                </svg>
            </div>
            <div class="title" data-i18n="title">Exchange</div>
            <div class="subtitle" data-i18n="subtitle">USDT → RUB</div>
        </div>

        <div class="rate-card">
            <div class="rate-label" data-i18n="rate_label">Current rate</div>
            <div class="rate-value">75.00 <span class="rate-unit">RUB</span></div>
            <div class="rate-label" style="margin-top: 4px;" data-i18n="rate_per">per 1 USDT</div>
        </div>

        <div class="form-card">
            <div class="input-group">
                <div class="input-label">
                    <span data-i18n="you_send">You send</span>
                    <span data-i18n="min_amount">min 10 USDT</span>
                </div>
                <div class="input-wrapper">
                    <input type="number" id="usdtAmount" placeholder="0.00" step="any">
                </div>
            </div>
        </div>

        <div class="result-card">
            <div class="result-label" data-i18n="you_receive">You receive</div>
            <div class="result-value" id="rubAmount">0.00 RUB</div>
        </div>

        <div class="fee-card">
            <span class="fee-label" data-i18n="service_fee">Service fee</span>
            <span class="fee-value" id="feeValue">0.00 RUB</span>
        </div>

        <div id="statusContainer" class="hidden"></div>

        <button class="exchange-btn" id="exchangeBtn">
            <span data-i18n="sell_btn">Sell USDT</span>
        </button>

        <div class="info">
            <div class="info-row" data-i18n="info_instant">Instant exchange via CryptoPay</div>
            <div class="info-row" data-i18n="info_rate">Best rate on market</div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ⚠️ ЗАМЕНИ НА СВОИ ДАННЫЕ ⚠️
        const SUPABASE_URL = 'https://mstekqneofdufkyqghqu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1zdGVrcW5lb2ZkdWZreXFnaHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODQzMjksImV4cCI6MjA4OTc2MDMyOX0.N8E1vfkz8lv_eQPmsZGJ7UGxmO23_eQnsi0yciLBGY0';
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const RATE = 75.00;
        const FEE_PERCENT = 0.5;
        const MIN_AMOUNT = 10;
        
        const translations = {
            ru: {
                title: 'Обменник',
                subtitle: 'USDT → RUB',
                rate_label: 'Актуальный курс',
                rate_per: 'за 1 USDT',
                you_send: 'Вы отдаете',
                min_amount: 'мин 10 USDT',
                you_receive: 'Вы получаете',
                service_fee: 'Комиссия сервиса',
                sell_btn: 'Продать USDT',
                info_instant: 'Мгновенный обмен через CryptoPay',
                info_rate: 'Лучший курс на рынке',
                alerts: {
                    enter_amount: 'Введите сумму',
                    min_amount: 'Минимальная сумма: {amount} USDT',
                    creating: 'Создание инвойса...',
                    error: 'Ошибка при создании инвойса'
                },
                status: {
                    pending: '⏳ Ожидание оплаты...',
                    completed: '✅ Оплата получена! Обмен завершен'
                }
            },
            en: {
                title: 'Exchange',
                subtitle: 'USDT → RUB',
                rate_label: 'Current rate',
                rate_per: 'per 1 USDT',
                you_send: 'You send',
                min_amount: 'min 10 USDT',
                you_receive: 'You receive',
                service_fee: 'Service fee',
                sell_btn: 'Sell USDT',
                info_instant: 'Instant exchange via CryptoPay',
                info_rate: 'Best rate on market',
                alerts: {
                    enter_amount: 'Enter amount',
                    min_amount: 'Minimum amount: {amount} USDT',
                    creating: 'Creating invoice...',
                    error: 'Error creating invoice'
                },
                status: {
                    pending: '⏳ Waiting for payment...',
                    completed: '✅ Payment received! Exchange completed'
                }
            }
        };
        
        let currentLang = 'ru';
        let currentTransactionId = null;
        let checkInterval = null;
        
        const i18nElements = document.querySelectorAll('[data-i18n]');
        const usdtInput = document.getElementById('usdtAmount');
        const rubAmount = document.getElementById('rubAmount');
        const feeValue = document.getElementById('feeValue');
        const exchangeBtn = document.getElementById('exchangeBtn');
        const statusContainer = document.getElementById('statusContainer');
        
        function updateLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            i18nElements.forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.textContent = t[key];
            });
            
            const btnSpan = exchangeBtn.querySelector('span');
            if (btnSpan) btnSpan.textContent = t.sell_btn;
        }
        
        function formatNumber(num) {
            return num.toLocaleString(currentLang === 'ru' ? 'ru-RU' : 'en-US', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        }
        
        function calculate() {
            let usdt = parseFloat(usdtInput.value);
            if (isNaN(usdt)) usdt = 0;
            
            let rubGross = usdt * RATE;
            let fee = rubGross * (FEE_PERCENT / 100);
            let rubNet = rubGross - fee;
            
            if (rubNet < 0) rubNet = 0;
            
            rubAmount.textContent = formatNumber(rubNet) + ' RUB';
            feeValue.textContent = formatNumber(fee) + ' RUB';
            
            return { usdt, rubNet, fee };
        }
        
        function showStatus(message, type = 'pending') {
            statusContainer.classList.remove('hidden');
            statusContainer.className = `status-badge status-${type}`;
            statusContainer.textContent = message;
        }
        
        function hideStatus() {
            statusContainer.classList.add('hidden');
        }
        
        async function checkTransactionStatus(transactionId) {
            try {
                const { data, error } = await supabase
                    .from('transactions')
                    .select('status')
                    .eq('id', transactionId)
                    .single();
                
                if (error) throw error;
                
                if (data.status === 'completed') {
                    if (checkInterval) clearInterval(checkInterval);
                    showStatus(translations[currentLang].status.completed, 'success');
                    exchangeBtn.disabled = false;
                    exchangeBtn.querySelector('span').textContent = translations[currentLang].sell_btn;
                    return true;
                }
                return false;
            } catch (error) {
                console.error('Error checking status:', error);
                return false;
            }
        }
        
        async function createInvoiceViaEdge(usdtAmount, userId) {
            const edgeUrl = `${SUPABASE_URL}/functions/v1/create-crypto-pay-invoice`;
            
            const response = await fetch(edgeUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                },
                body: JSON.stringify({
                    amount: usdtAmount,
                    userId: userId
                })
            });
            
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }
            
            return await response.json();
        }
        
        async function saveTransaction(userId, usdtAmount, rubAmount, feeAmount, invoiceId) {
            const { data, error } = await supabase
                .from('transactions')
                .insert({
                    user_id: userId,
                    usdt_amount: usdtAmount,
                    rub_amount: rubAmount,
                    fee: feeAmount,
                    rate: RATE,
                    invoice_id: invoiceId,
                    status: 'pending'
                })
                .select()
                .single();
            
            if (error) throw error;
            return data;
        }
        
        async function handleExchange() {
            let usdt = parseFloat(usdtInput.value);
            const t = translations[currentLang];
            
            if (isNaN(usdt) || usdt <= 0) {
                tg.showAlert(t.alerts.enter_amount);
                return;
            }
            
            if (usdt < MIN_AMOUNT) {
                tg.showAlert(t.alerts.min_amount.replace('{amount}', MIN_AMOUNT));
                return;
            }
            
            const { rubNet, fee } = calculate();
            const userId = tg.initDataUnsafe?.user?.id || null;
            
            exchangeBtn.disabled = true;
            const btnSpan = exchangeBtn.querySelector('span');
            btnSpan.innerHTML = `<span class="loader"></span>${t.alerts.creating}`;
            hideStatus();
            
            try {
                // 1. Создаем инвойс через Edge Function
                const invoice = await createInvoiceViaEdge(usdt, userId);
                
                if (!invoice.success) {
                    throw new Error('Failed to create invoice');
                }
                
                // 2. Сохраняем транзакцию в Supabase
                const transaction = await saveTransaction(
                    userId, usdt, rubNet, fee, invoice.invoice_id
                );
                
                currentTransactionId = transaction.id;
                
                // 3. Показываем статус
                showStatus(t.status.pending, 'pending');
                
                // 4. Открываем оплату через @send
                tg.openTelegramLink(invoice.pay_url);
                
                // 5. Начинаем проверку статуса оплаты
                if (checkInterval) clearInterval(checkInterval);
                checkInterval = setInterval(async () => {
                    const completed = await checkTransactionStatus(currentTransactionId);
                    if (completed) {
                        clearInterval(checkInterval);
                        btnSpan.textContent = t.sell_btn;
                    }
                }, 3000);
                
                // 6. Останавливаем проверку через 10 минут
                setTimeout(() => {
                    if (checkInterval) {
                        clearInterval(checkInterval);
                        btnSpan.textContent = t.sell_btn;
                        exchangeBtn.disabled = false;
                    }
                }, 600000);
                
            } catch (error) {
                console.error('Exchange error:', error);
                tg.showAlert(t.alerts.error);
                exchangeBtn.disabled = false;
                btnSpan.textContent = t.sell_btn;
                hideStatus();
            }
        }
        
        // Language buttons
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                currentLang = lang;
                
                document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                updateLanguage(lang);
                calculate();
            });
        });
        
        usdtInput.addEventListener('input', function() {
            let val = this.value.replace(/,/g, '.');
            if (val.split('.')[1]?.length > 4) {
                val = parseFloat(val).toFixed(4);
                this.value = val;
            }
            calculate();
        });
        
        exchangeBtn.addEventListener('click', handleExchange);
        
        updateLanguage('ru');
        calculate();
        tg.ready();
    </script>
</body>
</html>
